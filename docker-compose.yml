version: '3.8'
services:
  collector:
    build:
      context: .
      dockerfile: src/DataAggregator.Collector/Dockerfile
    ports:
      - "5000:80"
    environment:
      - CollectorType=OpenCN
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - influxdb
      - registration

  registration:
    build:
      context: .
      dockerfile: src/DataAggregator.Registration/Dockerfile
    ports:
      - "5001:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - PGHOST=postgres
      - PGPORT=5432
      - PGDATABASE=dataaggregator
      - PGUSER=admin
      - PGPASSWORD=password123
    depends_on:
      - postgres

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: dataaggregator
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  influxdb:
    image: influxdb:3-core
    ports:
      - "8181:8181"
    environment:
      INFLUXDB3_AUTH_TOKEN: your-token
    command:
      - influxdb3
      - serve
      - --node-id=node0
      - --object-store=file
      - --data-dir=/var/lib/influxdb3
    volumes:
      - influx_data:/var/lib/influxdb3

  influxdb-ui:
    image: influxdata/influxdb3-ui:1.0.0
    container_name: influxdb3-explorer
    ports:
      - "8888:80"
    environment:
      INFLUXDB_URL: http://influxdb:8181
    command: ["--mode=admin"]
    depends_on:
      - influxdb
      
volumes:
  postgres_data:
  influx_data:
