version: '3.8'
services:
  collector-api:
    build:
      context: .
      dockerfile: src/Collector/DataSystem.Collector.Api/Dockerfile
    ports:
      - "5000:80"
    depends_on:
      - influxdb
      - registration-api

  registration-api:
    build:
      context: .
      dockerfile: src/Registration/DataSystem.Registration.Api/Dockerfile
    ports:
      - "5001:80"
    depends_on:
      - postgres

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: datasystem
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  influxdb:
    image: influxdb:3.0
    ports:
      - "8086:8086"
    environment:
      # InfluxDB v3 configuration
      INFLUXDB_INIT_MODE: setup
      INFLUXDB_INIT_USERNAME: admin
      INFLUXDB_INIT_PASSWORD: password123
      INFLUXDB_INIT_ORG: datasystem-org
      INFLUXDB_INIT_BUCKET: datasystem-bucket
      INFLUXDB_INIT_ADMIN_TOKEN: datasystem-admin-token-12345
    volumes:
      - influx_data:/var/lib/influxdb3
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
  influx_data:
