version: '3.8'
services:
  collector:
    build:
      context: .
      dockerfile: src/DataAggregator.Collector/Dockerfile
    ports:
      - "5000:80"
    environment:
      - CollectorType=OpenCN
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - influxdb
      - registration

  registration:
    build:
      context: .
      dockerfile: src/DataAggregator.Registration/Dockerfile
    ports:
      - "5001:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - PGHOST=postgres
      - PGPORT=5432
      - PGDATABASE=dataaggregator
      - PGUSER=admin
      - PGPASSWORD=password123
    depends_on:
      - postgres

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: dataaggregator
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  influxdb:
    image: influxdb:3.0
    ports:
      - "8086:8086"
    environment:
      INFLUXDB_INIT_MODE: setup
      INFLUXDB_INIT_USERNAME: admin
      INFLUXDB_INIT_PASSWORD: password123
      INFLUXDB_INIT_ORG: dataaggregator-org
      INFLUXDB_INIT_BUCKET: dataaggregator-bucket
      INFLUXDB_INIT_ADMIN_TOKEN: dataaggregator-admin-token-12345
    volumes:
      - influx_data:/var/lib/influxdb3

volumes:
  postgres_data:
  influx_data:
